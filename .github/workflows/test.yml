# ─────────────────────────────────────────────────────────────────────────────
# test.yml — Pipeline de GitHub Actions para correr los tests en CI
#
# Se ejecuta automáticamente cada vez que haces push o pull request a main.
# GitHub Actions corre en un servidor Ubuntu limpio sin Chrome instalado,
# por eso usamos playwright.config.ci.js que usa Chromium (descargado por Playwright)
# ─────────────────────────────────────────────────────────────────────────────
name: Playwright Tests

on:
  # Ejecutar en push a main o en cualquier Pull Request hacia main
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    # Tiempo máximo que puede durar el job antes de cancelarse
    timeout-minutes: 60

    # Servidor donde corre el pipeline (Ubuntu gratuito de GitHub)
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio en el servidor
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Instalar Node.js v20 con caché de npm para acelerar futuras ejecuciones
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # Paso 3: Instalar dependencias del package.json
      # 'npm ci' es más estricto que 'npm install' — usa exactamente el package-lock.json
      - name: Install dependencies
        run: npm ci

      # Paso 4: Descargar solo Chromium (no Firefox ni WebKit)
      # '--with-deps' también instala las librerías del sistema que Chromium necesita en Ubuntu
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Paso 5: Correr los tests en modo headless usando la config de CI
      # playwright.config.ci.js usa Chromium en lugar de Chrome real
      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ci.js

      # Paso 6: Subir el reporte HTML como artifact de GitHub
      # Se puede descargar desde la pestaña Actions → run → Artifacts
      # 'if: !cancelled()' lo sube incluso si el test falló, para poder ver el reporte
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30  # El reporte se guarda 30 días en GitHub
