# ─────────────────────────────────────────────────────────────────────────────
# test.yml — Pipeline de GitHub Actions para correr los tests en CI
#
# Se ejecuta automáticamente cada vez que haces push o pull request a main.
# GitHub Actions corre en un servidor Ubuntu limpio sin Chrome instalado,
# por eso usamos playwright.config.ci.js que usa Chromium (descargado por Playwright)
# ─────────────────────────────────────────────────────────────────────────────
name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # Paso 1: Descargar el código del repositorio en el servidor
      - name: Checkout repository
        uses: actions/checkout@v4

      # Paso 2: Instalar Node.js 22 (LTS estable, evita el warning de deprecación)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Paso 3: Instalar dependencias exactas del package-lock.json
      - name: Install dependencies
        run: npm ci

      # Paso 4: Descargar Chromium con sus dependencias del sistema en Ubuntu
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # Paso 5: Correr tests en headless usando la config de CI
      - name: Run Playwright tests
        run: npx playwright test --config=playwright.config.ci.js

      # Paso 6: Subir reporte HTML como artifact (disponible aunque el test falle)
      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30